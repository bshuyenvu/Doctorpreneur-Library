<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="Doctorpreneur Library — thư viện tri thức mở dành cho bác sĩ khởi nghiệp HealthTech, AI Healthcare và Medical Education.">
  <meta name="theme-color" content="#0b1f3a">
  <link rel="canonical" href="https://bshuyenvu.github.io/Doctorpreneur-Library/">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="vi_VN">
  <meta property="og:title" content="Doctorpreneur Library">
  <meta property="og:description" content="Thư viện tri thức mở dành cho bác sĩ khởi nghiệp HealthTech, AI Healthcare và Medical Education.">
  <meta property="og:url" content="https://bshuyenvu.github.io/Doctorpreneur-Library/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Doctorpreneur Library">
  <meta name="twitter:description" content="Từ vấn đề bên giường bệnh đến sản phẩm HealthTech có bằng chứng, an toàn và có thể mở rộng.">
  <title>Doctorpreneur Library</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩺</text></svg>">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-dark-mode@latest/dist/style.min.css">
  <style>
    :root { --brand:#0b6e99; --navy:#0b1f3a; --cyan:#06b6d4; --soft:#eef8fb; }
    body { letter-spacing:.01em; }
    .app-name-link { font-weight:800; }
    .markdown-section { max-width: 1040px; }
    .markdown-section h1,.markdown-section h2,.markdown-section h3 { color:var(--navy); }
    .markdown-section a { color:var(--brand); }
    .markdown-section table { display:table; width:100%; font-size:.92rem; }
    .markdown-section blockquote { border-left:4px solid var(--cyan); background:var(--soft); padding:.65rem 1rem; }
    .sidebar { border-right:1px solid #e5e7eb; }
    .sidebar-nav > ul > li > p { font-weight:800; color:var(--navy); margin-top:1rem; }
    .cover-main > p:last-child a { border-radius:999px; }
    .giscus-wrap { margin-top:3rem; padding-top:1.5rem; border-top:1px solid #e5e7eb; }
    .edit-link { display:inline-block; margin-top:2rem; font-weight:700; }
    @media (prefers-color-scheme:dark) {
      .markdown-section h1,.markdown-section h2,.markdown-section h3,.sidebar-nav > ul > li > p { color:#dff8ff; }
      .markdown-section blockquote { background:#0d2733; }
    }
  </style>
</head>
<body>
  <div id="app">Đang tải Doctorpreneur Library…</div>
  <script>
    window.$docsify = {
      name: '📚 Doctorpreneur Library',
      repo: 'bshuyenvu/Doctorpreneur-Library',
      homepage: 'README.md',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: true,
      notFoundPage: '_404.md',
      subMaxLevel: 3,
      auto2top: true,
      relativePath: false,
      mergeNavbar: true,
      executeScript: true,
      externalLinkTarget: '_blank',
      externalLinkRel: 'noopener noreferrer',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Tìm trong toàn bộ thư viện…',
        noData: 'Không tìm thấy nội dung phù hợp.',
        depth: 4,
        hideOtherSidebarContent: false
      },
      pagination: {
        previousText: '← Chương trước',
        nextText: 'Chương tiếp →',
        crossChapter: true,
        crossChapterText: true
      },
      tabs: { persist: true, sync: true, theme: 'classic', tabComments: true, tabHeadings: true },
      darkMode: {
        dark: { background:'#0b1320', toggleBtnBg:'#253247', textColor:'#e5eef7' },
        light:{ background:'#ffffff', toggleBtnBg:'#0b6e99', textColor:'#1f2937' }
      },
      editLink: {
        text: '✏️ Chỉnh sửa trang này',
        repo: 'https://github.com/bshuyenvu/Doctorpreneur-Library/blob/main/',
        cssClass: 'edit-link'
      },
      ga: '', // Điền Measurement ID dạng G-XXXXXXXXXX khi đã cấu hình Google Analytics.
      plugins: [
        function doctorpreneurComments(hook, vm) {
          hook.afterEach(function(html) {
            return html + '<div class="giscus-wrap"><h2>Thảo luận</h2><div class="giscus"></div></div>';
          });
          hook.doneEach(function() {
            /*
             * KÍCH HOẠT GISCUS:
             * 1) Repository phải public và đã bật Discussions.
             * 2) Cài ứng dụng Giscus cho repository.
             * 3) Mở https://giscus.app và nhập repository "bshuyenvu/Doctorpreneur-Library".
             * 4) Chọn category, sau đó sao chép data-repo-id và data-category-id.
             * 5) Chỉ cần thay repoId và categoryId bên dưới; data-repo đã được cấu hình sẵn.
             * 6) Nếu chưa cấu hình, script sẽ không chạy để tránh lỗi giao diện.
             */
            const repo = 'bshuyenvu/Doctorpreneur-Library';
            const repoId = 'YOUR_REPO_ID';
            const categoryId = 'YOUR_CATEGORY_ID';
            const host = document.querySelector('.giscus');
            if (!host || repoId.startsWith('YOUR_') || categoryId.startsWith('YOUR_')) return;
            document.querySelectorAll('script[data-doctorpreneur-giscus]').forEach(el => el.remove());
            const script = document.createElement('script');
            script.src = 'https://giscus.app/client.js';
            script.setAttribute('data-doctorpreneur-giscus','true');
            script.setAttribute('data-repo', repo);
            script.setAttribute('data-repo-id', repoId);
            script.setAttribute('data-category', 'General');
            script.setAttribute('data-category-id', categoryId);
            script.setAttribute('data-mapping', 'pathname');
            script.setAttribute('data-strict', '0');
            script.setAttribute('data-reactions-enabled', '1');
            script.setAttribute('data-emit-metadata', '0');
            script.setAttribute('data-input-position', 'top');
            script.setAttribute('data-theme', 'preferred_color_scheme');
            script.setAttribute('data-lang', 'vi');
            script.crossOrigin = 'anonymous';
            script.async = true;
            host.appendChild(script);

            /*
             * DISQUS THAY THẾ (mẫu, đang tắt):
             * - Comment toàn bộ khối Giscus phía trên.
             * - Tạo <div id="disqus_thread"></div> trong hook.afterEach.
             * - Thay YOUR_SHORTNAME rồi bỏ comment:
             *
             * window.disqus_config = function () {
             *   this.page.url = window.location.href;
             *   this.page.identifier = vm.route.file;
             * };
             * const d = document, s = d.createElement('script');
             * s.src = 'https://YOUR_SHORTNAME.disqus.com/embed.js';
             * s.setAttribute('data-timestamp', +new Date());
             * (d.head || d.body).appendChild(s);
             */
          });
        }
      ]
    };
  </script>

  <!-- Thứ tự plugin: core → search → sidebar → copy → zoom → pagination → tabs → dark → edit -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-dark-mode@latest/dist/index.min.js"></script>
  <script src="//unpkg.com/docsify-edit-link@1"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/ga.min.js"></script>
</body>
</html>
