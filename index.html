<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>📚 Doctorpreneur Library</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Thư viện tri thức dành cho Bác sĩ Khởi nghiệp, HealthTech Founder và Medical AI Expert.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Theme Vue -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css">
  
  <!-- CSS Bổ sung -->
  <style>
    :root {
      --theme-color: #2c3e50;
    }
    .app-name-link img {
      width: 60px;
      margin-bottom: 10px;
    }
    .giscus {
      max-width: 800px;
      margin: 0 auto;
      padding-bottom: 40px;
      margin-top: 40px;
      border-top: 1px solid #eaecef;
      padding-top: 20px;
    }
    .markdown-section {
      max-width: 900px;
    }
  </style>
</head>
<body>
  <div id="app">Đang tải thư viện Doctorpreneur...</div>
  <script>
    window.$docsify = {
      name: '📚 Doctorpreneur',
      repo: 'your-username/Doctorpreneur-Library', // Thay bằng repo thật của bạn
      loadSidebar: true,
      loadNavbar: true,
      coverpage: true,
      subMaxLevel: 3,
      auto2top: true,
      notFoundPage: '_404.md',
      
      // Cấu hình tìm kiếm
      search: {
        maxAge: 86400000, 
        paths: 'auto',
        placeholder: '🔍 Tìm kiếm trong thư viện...',
        noData: '😞 Không tìm thấy kết quả!',
        depth: 4,
        hideOtherSidebarContent: false,
      },
      
      // Phân trang
      pagination: {
        previousText: 'TRƯỚC',
        nextText: 'TIẾP THEO',
        crossChapter: true,
        crossChapterText: true,
      },
      
      // Tabs plugin
      tabs: {
        persist: true,
        sync: true,
        theme: 'classic',
        tabComments: true,
        tabHeadings: true
      },

      plugins: [
        function(hook, vm) {
          // Edit Link Plugin
          hook.beforeEach(function(html) {
            var editHtml = '\n\n----\n\n[✏️ Chỉnh sửa trang này trên GitHub](https://github.com/your-username/Doctorpreneur-Library/edit/main/' + vm.route.file + ')\n';
            return html + editHtml;
          });
          
          // Giscus Plugin
          hook.afterEach(function(html, next) {
            var giscusContainer = '<div class="giscus"></div>';
            /* HƯỚNG DẪN TÍCH HỢP GISCUS:
               1. Truy cập https://giscus.app/
               2. Nhập repo của bạn (ví dụ: username/Doctorpreneur-Library). Repo phải là Public và bật Discussions.
               3. Lấy `data-repo-id` và `data-category-id` từ mã script Giscus tạo ra.
               4. Thay thế vào đoạn script ở hook.doneEach bên dưới.
               
               Nếu muốn dùng DISQUS, xóa code Giscus và dùng:
               var disqusHtml = '<div id="disqus_thread"></div>';
               (Cần load script disqus_shortname)
            */
            next(html + giscusContainer);
          });

          hook.doneEach(function() {
            if (typeof document !== 'undefined') {
              var giscusScript = document.createElement('script');
              giscusScript.type = 'text/javascript';
              giscusScript.src = 'https://giscus.app/client.js';
              giscusScript.setAttribute('data-repo', 'your-username/Doctorpreneur-Library'); // THAY ĐỔI
              giscusScript.setAttribute('data-repo-id', 'R_kgDO_YOUR_ID'); // THAY ĐỔI
              giscusScript.setAttribute('data-category', 'General');
              giscusScript.setAttribute('data-category-id', 'DIC_kwDO_YOUR_ID'); // THAY ĐỔI
              giscusScript.setAttribute('data-mapping', 'title');
              giscusScript.setAttribute('data-strict', '0');
              giscusScript.setAttribute('data-reactions-enabled', '1');
              giscusScript.setAttribute('data-emit-metadata', '0');
              giscusScript.setAttribute('data-input-position', 'bottom');
              giscusScript.setAttribute('data-theme', 'preferred_color_scheme');
              giscusScript.setAttribute('data-lang', 'vi');
              giscusScript.setAttribute('crossorigin', 'anonymous');
              giscusScript.async = true;
              
              var container = document.querySelector('.giscus');
              if (container) {
                container.appendChild(giscusScript);
              }
            }
          });
        }
      ]
    }
  </script>
  
  <!-- Docsify Core & Plugins CDN -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
  <!-- Plugin Collapse Sidebar -->
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/src/index.min.js"></script>
</body>
</html>
